name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs:
    name: Docs link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The skills submodule is checked out so docs/PATTERNS.md's relative
          # link into it resolves during the offline link check.
          submodules: recursive

      # Offline: validates relative links between README / docs / skills.
      # External URLs are not requested, so the job is deterministic.
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress "**/*.md"
          fail: true
